# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Fix for "CreateProcess error=740, The requested operation requires elevation"
# This forces the Kotlin compiler to run inside the Gradle process
kotlin.compiler.execution.strategy=in-process
# This disables the AAPT2 daemon process and runs it in-process
android.aapt2.daemon.maxProcessCount=0
# Disable VFS watching to avoid file lock issues on Windows
org.gradle.vfs.watch=false
